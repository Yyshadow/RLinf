# Beat-block-hammer LWD critic ablation:
# stronger failed down-weighting with the original horizon and quantile.

defaults:
  - robotwin_lwd_critic_cloud_beat_block
  - _self_

runner:
  logger:
    experiment_name: robotwin_lwd_critic_s1_f025_n1_h50_tau06_8a100

data:
  action_horizon: 50
  train_data_paths:
    - dataset_path: beat_block_hammer_success_train
      weight: 1.0
    - dataset_path: beat_block_hammer_failed_train
      weight: 0.25
    - dataset_path: beat_block_hammer_nearmiss_train
      weight: 1.0

actor:
  model:
    action_horizon: 50
    quantile_tau: 0.6
