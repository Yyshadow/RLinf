# Single-GPU smoke/train config for a LWD-style RoboTwin critic.

seed: 0
device: cuda

data:
  train_data_paths:
    - dataset_path: /data/wam_codebase/RLinf/datasets/robotwin_aloha/beat_block_hammer_30ep
      weight: 1.0
    - dataset_path: /data/wam_codebase/RLinf/datasets/robotwin_aloha/beat_block_hammer_failed_20ep
      weight: 1.0
    - dataset_path: /data/wam_codebase/RLinf/datasets/robotwin_aloha/beat_block_hammer_nearmiss_20ep
      weight: 2.0
  action_horizon: 10
  batch_size: 1
  num_workers: 0
  max_samples: null
  image_keys:
    - cam_high
    - cam_left_wrist
    - cam_right_wrist

model:
  model_type: lwd_critic
  precision: bf16
  siglip_path: /path/to/siglip2-so400m-patch14-224
  gemma3_path: /path/to/gemma-3-270m
  tokenizer_path: /path/to/gemma-3-270m
  critic_expert_variant: gemma_1m
  action_expert_variant: gemma_300m
  action_dim: 14
  action_horizon: ${data.action_horizon}
  max_token_len: 200
  freeze_vision_encoder: false
  freeze_vlm: false
  stop_gradient_to_vlm: false
  num_bins: 201
  v_min: -1.0
  v_max: 1.0
  quantile_tau: 0.6
  action_hidden_dim: 256
  q_hidden_dims: [512, 256, 128]
  num_q_heads: 2
  is_lora: false
  load_to_device: false

optim:
  lr: 5.0e-4
  weight_decay: 1.0e-6
  gamma: 0.99
  ema_tau: 0.005
  value_loss_weight: 1.0
  q_loss_weight: 1.0
  max_grad_norm: 1.0

runner:
  max_steps: 100
  log_interval: 10
  save_interval: 100
  output_dir: /data/wam_codebase/RLinf/checkpoints/lwd/robotwin_beat_block_hammer
