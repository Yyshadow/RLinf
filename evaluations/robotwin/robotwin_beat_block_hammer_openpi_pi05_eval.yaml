defaults:
  - env/robotwin_beat_block_hammer@env.eval
  - model/pi0_5@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env, rollout: 0-0

runner:
  task_type: embodied_eval
  logger:
    log_path: /data/wam_codebase/RLinf/outputs/eval_pi05_hammer50_step500_quick
    project_name: rlinf
    experiment_name: pi05_hammer50_step500_quick_eval
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: true
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: /data/wam_codebase/RLinf/checkpoints/rlinf_pi05_sft/pi05_hammer50_full_train/checkpoints/global_step_500/actor/model_state_dict/full_weights.pt

env:
  group_name: EnvGroup
  enable_offload: true
  eval:
    rollout_epoch: 1
    total_num_envs: 4
    auto_reset: true
    ignore_terminations: true
    max_episode_steps: 200
    reward_coef: 1.0
    max_steps_per_rollout_epoch: 200
    group_size: 1
    use_fixed_reset_state_ids: true
    is_eval: true
    assets_path: ${oc.env:ROBOTWIN_ASSETS_PATH,/data/wam_codebase/RoboTwin_RLinf}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: true
      record_chunk_frames: true
      fps: 10
      video_base_dir: ${runner.logger.log_path}/video/eval
    center_crop: false
    task_config:
      embodiment: [aloha-agilex]
      render_freq: 1
      camera:
        collect_wrist_camera: true
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0

rollout:
  group_name: RolloutGroup
  backend: huggingface
  recompute_logprobs: false
  enable_offload: true
  pipeline_stage_num: 1
  model:
    model_path: /data/wam_codebase/RLinf/checkpoints/torch/pi05_base_hammer50
    num_action_chunks: 50
    action_dim: 14
    add_value_head: false
    num_steps: 5
    openpi:
      config_name: pi05_aloha_robotwin
      norm_stats_path: /data/wam_codebase/RLinf/checkpoints/torch/pi05_base_hammer50/physical-intelligence/robotwin/norm_stats.json
      num_images_in_input: 3
      noise_level: 0.5
      detach_critic_input: true
      train_expert_only: false
